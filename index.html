<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusPay Mini App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669', 800: '#065f46', 900: '#064e3b', 950: '#022c22' }, gold: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' } },
                    animation: { 'slide-up': 'slideUp 0.8s ease-out forwards', 'pulse-gold': 'pulseGold 2s infinite', 'spin-fast': 'spin 0.6s linear infinite' },
                    keyframes: { slideUp: { '0%': { opacity: '0', transform: 'translateY(30px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }, pulseGold: { '0%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(251, 191, 36, 0.6)' }, '50%': { transform: 'scale(1.03)', boxShadow: '0 0 0 12px rgba(251, 191, 36, 0)' }, '100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(251, 191, 36, 0)' } } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .phone-frame { width: 375px; height: 667px; border-radius: 40px; background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), 0 0 0 10px #1e293b, 0 0 0 12px #334155; position: relative; overflow: hidden; }
        .bg-curves { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.25) 0%, transparent 60%), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.15) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .credit-card { background: linear-gradient(135deg, rgba(16, 185, 129, 0.7) 0%, rgba(6, 78, 59, 0.9) 100%); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.3); border-radius: 20px; }
        .progress-circle { width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(#34d399 162deg, rgba(255, 255, 255, 0.1) 162deg); position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 25px rgba(52, 211, 153, 0.25); margin: 0 auto; }
        .progress-circle::before { content: ""; position: absolute; width: 116px; height: 116px; background: #064e3b; border-radius: 50%; box-shadow: inset 0 4px 10px rgba(0,0,0,0.5); }
        .progress-content { position: relative; z-index: 10; text-align: center; }
        .tab-content { position: absolute; top: 0; left: 0; right: 0; bottom: 80px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease; padding: 24px; padding-top: 48px; z-index: 1; overflow-y: auto; }
        .tab-content::-webkit-scrollbar { display: none; }
        .tab-hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .tab-hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .tab-active { transform: translateX(0); opacity: 1; pointer-events: auto; }
        .btn-scale { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-scale:hover { transform: scale(1.03); }
        .btn-scale:active { transform: scale(0.92); }
        .anim-delay-100 { animation-delay: 100ms; opacity: 0; }
        .anim-delay-200 { animation-delay: 200ms; opacity: 0; }
        .anim-delay-300 { animation-delay: 300ms; opacity: 0; }
        .modal-backdrop { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 50; }
        .modal-backdrop.active { opacity: 1; pointer-events: auto; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 280px; }
        .modal-backdrop.active .modal-content { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="bg-curves"></div>

        <div id="tab-passenger" class="tab-content tab-active">
            <div class="flex justify-between items-center mb-6 animate-slide-up">
                <div>
                    <h1 class="text-white text-2xl font-bold tracking-tight">BusPay</h1>
                    <p id="user-name" class="text-emerald-400 text-sm">Xin chào, Hành khách</p>
                </div>
                <div class="w-10 h-10 rounded-full glass-panel flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
            </div>

            <div class="credit-card p-5 mb-6 animate-slide-up anim-delay-100 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-5 rounded-full -mr-10 -mt-10"></div>
                <div class="flex justify-between items-start mb-6">
                    <p class="text-emerald-100 text-sm font-medium">Số dư khả dụng</p>
                </div>
                <h2 class="text-white text-3xl font-bold tracking-wider mb-1">10.00 cUSD</h2>
                <p class="text-emerald-200 text-xs">Web3 Wallet Connected</p>
            </div>

            <div class="glass-panel rounded-3xl p-6 mb-8 animate-slide-up anim-delay-200 text-center">
                <h3 class="text-white text-base font-semibold mb-5">Tiến trình hạng Vàng</h3>
                <div id="progress-ring" class="progress-circle" style="background: conic-gradient(#34d399 0deg, rgba(255, 255, 255, 0.1) 0deg);">
                    <div class="progress-content">
                        <span class="text-white text-2xl font-bold block leading-none"><span id="ride-count">0</span><span class="text-sm text-emerald-400">/100</span></span>
                        <span class="text-emerald-400 text-xs font-medium uppercase tracking-wider mt-1 block">Chuyến xe</span>
                    </div>
                </div>
            </div>

            <div class="animate-slide-up anim-delay-300">
                <button id="pay-btn" class="w-full bg-gradient-to-r from-gold-400 to-gold-500 text-emerald-950 font-bold text-lg py-4 rounded-full shadow-xl animate-pulse-gold btn-scale flex justify-center items-center h-[60px] relative z-10">
                    <span id="pay-text">THANH TOÁN VÉ (0.3 cUSD)</span>
                    <div id="pay-spinner" class="spinner hidden"></div>
                </button>
            </div>
        </div>

        <div id="tab-driver" class="tab-content tab-hidden-right">
             <div class="mb-8 mt-2">
                <h1 class="text-white text-2xl font-bold tracking-tight text-center">Báo cáo ca làm</h1>
                <p class="text-emerald-400 text-sm text-center mt-1">Hôm nay, 18 Thg 4</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel rounded-2xl p-5 flex flex-col items-center justify-center text-center relative overflow-hidden group">
                    <span class="text-3xl font-bold text-white mb-1">150</span>
                    <span class="text-xs text-emerald-300 uppercase tracking-wider font-medium">Vé đã bán</span>
                </div>
                <div class="glass-panel rounded-2xl p-5 flex flex-col items-center justify-center text-center relative overflow-hidden group border-gold-500/30">
                    <span class="text-3xl font-bold text-gold-400 mb-1">45.00</span>
                    <span class="text-xs text-emerald-300 uppercase tracking-wider font-medium">cUSD Doanh thu</span>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 h-20 glass-panel border-t border-emerald-800/50 flex justify-around items-center px-6 z-20 bg-[#064e3b]/80">
            <button onclick="switchTab('passenger')" id="nav-passenger" class="flex flex-col items-center gap-1 text-gold-400 transition-colors">
                <span class="text-[10px] font-semibold uppercase tracking-wide">Hành khách</span>
            </button>
            <button onclick="switchTab('driver')" id="nav-driver" class="flex flex-col items-center gap-1 text-emerald-500 hover:text-emerald-300 transition-colors">
                <span class="text-[10px] font-semibold uppercase tracking-wide">Tài xế</span>
            </button>
        </div>

        <div id="payment-modal" class="modal-backdrop">
            <div class="modal-content glass-panel rounded-3xl p-6 text-center shadow-2xl bg-emerald-500/20 border-emerald-400/30">
                <h2 class="text-white text-xl font-bold mb-2">Thanh toán thành công!</h2>
                <p class="text-emerald-200 text-sm mb-6">Đã chuyển 0.3 cUSD về ví nhà xe.</p>
                <button id="close-modal" class="w-full bg-gray-700/80 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl transition-colors btn-scale">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        // BƯỚC DUY NHẤT BẠN CẦN LÀM: Sửa địa chỉ ví bên trong dấu ngoặc kép này.
        // NHỚ: KHÔNG xóa dấu ngoặc kép (" ")
        const COMPANY_WALLET = "0xb52640c1983b09B9a164aA2143E1E4f53D988Cf2"; 

        // 1. CHUYỂN TAB
        const tabPassenger = document.getElementById('tab-passenger');
        const tabDriver = document.getElementById('tab-driver');
        const navPassenger = document.getElementById('nav-passenger');
        const navDriver = document.getElementById('nav-driver');
        let currentTab = 'passenger';

        window.switchTab = function(tab) {
            if (currentTab === tab) return;
            if (tab === 'driver') {
                tabPassenger.className = 'tab-content tab-hidden-left';
                tabDriver.className = 'tab-content tab-active';
                navPassenger.className = 'flex flex-col items-center gap-1 text-emerald-500 hover:text-emerald-300 transition-colors';
                navDriver.className = 'flex flex-col items-center gap-1 text-gold-400 transition-colors';
            } else {
                tabDriver.className = 'tab-content tab-hidden-right';
                tabPassenger.className = 'tab-content tab-active';
                navPassenger.className = 'flex flex-col items-center gap-1 text-gold-400 transition-colors';
                navDriver.className = 'flex flex-col items-center gap-1 text-emerald-500 hover:text-emerald-300 transition-colors';
            }
            currentTab = tab;
        }

        // 2. CẬP NHẬT GIAO DIỆN VÀ VÍ
        let currentRides = 0; 
        const MAX_RIDES = 100;

        function updateProgressRing(rides) {
            document.getElementById('ride-count').innerText = rides;
            const percentage = rides / MAX_RIDES;
            const degrees = Math.round(percentage * 360);
            document.getElementById('progress-ring').style.background = `conic-gradient(#34d399 ${degrees}deg, rgba(255, 255, 255, 0.1) ${degrees}deg)`;
        }

        async function fetchWalletAddress() {
            try {
                if (typeof window.ethereum !== 'undefined') {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    if (accounts && accounts.length > 0) {
                        const wallet = accounts[0];
                        const shortAddress = wallet.substring(0, 6) + "..." + wallet.substring(wallet.length - 4);
                        document.getElementById('user-name').innerText = "Ví: " + shortAddress;
                    }
                }
            } catch (error) {
                console.log("Lỗi tải ví: ", error);
            }
        }

        setTimeout(fetchWalletAddress, 500);
        updateProgressRing(currentRides);

        // 3. LOGIC NÚT THANH TOÁN
        const payBtn = document.getElementById('pay-btn');
        const payText = document.getElementById('pay-text');
        const paySpinner = document.getElementById('pay-spinner');
        const paymentModal = document.getElementById('payment-modal');
        const closeModalBtn = document.getElementById('close-modal');

        const cUSD_ADDRESS = "0x765DE816845861e75A25fCA122bb6898B8B1282a";
        const cUSD_ABI = ["function transfer(address to, uint256 value) returns (bool)"];

        payBtn.addEventListener('click', async () => {
            if (payBtn.disabled) return;

            if (typeof window.ethereum === 'undefined' || typeof ethers === 'undefined') {
                alert("⚠️ Vui lòng mở link bên trong ví MiniPay!");
                return;
            }

            try {
                payBtn.disabled = true;
                payBtn.classList.remove('animate-pulse-gold');
                payBtn.classList.add('scale-95', 'opacity-90');
                payText.classList.add('hidden');
                paySpinner.classList.remove('hidden');

                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();

                const cUSDContract = new ethers.Contract(cUSD_ADDRESS, cUSD_ABI, signer);
                const amount = ethers.utils.parseUnits("0.3", 18);

                const tx = await cUSDContract.transfer(COMPANY_WALLET, amount);
                await tx.wait(); 

                currentRides += 1;
                updateProgressRing(currentRides);
                paymentModal.classList.add('active');

            } catch (error) {
                alert("Giao dịch thất bại! Bạn cần có cUSD làm phí gas, hoặc bạn đã hủy giao dịch.");
            } finally {
                payBtn.disabled = false;
                payBtn.classList.add('animate-pulse-gold');
                payBtn.classList.remove('scale-95', 'opacity-90');
                payText.classList.remove('hidden');
                paySpinner.classList.add('hidden');
            }
        });

        closeModalBtn.addEventListener('click', () => {
            paymentModal.classList.remove('active');
        });
    </script>
</body>
</html>
